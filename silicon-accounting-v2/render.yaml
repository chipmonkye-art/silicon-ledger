services:
  - type: web
    name: silicon-accounting-v2
    env: node
    buildCommand: npm install && npm run build && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: HMAC_SECRET
        generateValue: true
      - key: PORT
        value: 10000
